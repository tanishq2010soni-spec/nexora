# DO NOT commit actual secrets. Use this template with:
#   kubectl create secret generic nexora-brain-secrets \
#     --from-literal=JWT_SECRET_KEY=<value> \
#     --from-literal=DATABASE_URL=<value> \
#     --from-literal=AGENT_REGISTRATION_KEY=<value> \
#     --from-literal=PROVIDER_ENCRYPTION_KEY=<value> \
#     --from-literal=STRIPE_SECRET_KEY=<value> \
#     --from-literal=STRIPE_WEBHOOK_SECRET=<value> \
#     --from-literal=RAZORPAY_KEY_SECRET=<value> \
#     --from-literal=RAZORPAY_WEBHOOK_SECRET=<value> \
#     --from-literal=TWILIO_AUTH_TOKEN=<value> \
#     --from-literal=META_APP_SECRET=<value> \
#     --from-literal=META_ACCESS_TOKEN=<value> \
#     --from-literal=SMTP_PASSWORD=<value>
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: nexora-brain-secrets
  namespace: nexora
  labels:
    app.kubernetes.io/name: nexora-brain
    app.kubernetes.io/part-of: nexora-platform
type: Opaque
stringData:
  JWT_SECRET_KEY: ""     # openssl rand -hex 32
  DATABASE_URL: ""       # postgresql+asyncpg://nexora:<pass>@nexora-postgres:5432/nexora
  AGENT_REGISTRATION_KEY: ""  # python -c "import secrets; print(secrets.token_urlsafe(32))"
  PROVIDER_ENCRYPTION_KEY: "" # python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  STRIPE_SECRET_KEY: ""
  STRIPE_PUBLISHABLE_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  RAZORPAY_KEY_ID: ""
  RAZORPAY_KEY_SECRET: ""
  RAZORPAY_WEBHOOK_SECRET: ""
  TWILIO_ACCOUNT_SID: ""
  TWILIO_AUTH_TOKEN: ""
  TWILIO_PHONE_NUMBER: ""
  META_APP_ID: ""
  META_APP_SECRET: ""
  META_VERIFY_TOKEN: ""
  META_ACCESS_TOKEN: ""
  META_PHONE_NUMBER_ID: ""
  SMTP_HOST: ""
  SMTP_USERNAME: ""
  SMTP_PASSWORD: ""
  SMTP_FROM_EMAIL: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: nexora-postgres-secret
  namespace: nexora
  labels:
    app.kubernetes.io/name: nexora-postgres
    app.kubernetes.io/part-of: nexora-platform
type: Opaque
stringData:
  POSTGRES_PASSWORD: ""  # openssl rand -hex 16
---
apiVersion: v1
kind: Secret
metadata:
  name: nexora-registry-secret
  namespace: nexora
  labels:
    app.kubernetes.io/name: nexora
    app.kubernetes.io/part-of: nexora-platform
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: ""  # {"auths":{"ghcr.io":{"auth":"<base64(user:token)>"}}}
