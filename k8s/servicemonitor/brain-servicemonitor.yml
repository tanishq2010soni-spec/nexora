apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nexora-brain
  namespace: nexora
  labels:
    app: nexora-brain
    app.kubernetes.io/name: nexora-brain
    app.kubernetes.io/part-of: nexora-platform
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: nexora-brain
  endpoints:
    - port: http
      path: /api/v1/metrics
      interval: 15s
      scrapeTimeout: 10s
      metricRelabelings:
        - sourceLabels: [__name__]
          regex: "nexora_.*"
          action: keep
    - port: metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nexora-postgres
  namespace: nexora
  labels:
    app: nexora-postgres
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: nexora-postgres
  endpoints:
    - port: postgres
      interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nexora-redis
  namespace: nexora
  labels:
    app: nexora-redis
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: nexora-redis
  endpoints:
    - port: redis
      interval: 30s
