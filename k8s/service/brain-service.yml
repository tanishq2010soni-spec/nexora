apiVersion: v1
kind: Service
metadata:
  name: nexora-brain
  namespace: nexora
  labels:
    app: nexora-brain
    app.kubernetes.io/name: nexora-brain
    app.kubernetes.io/part-of: nexora-platform
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: nexora-brain
---
apiVersion: v1
kind: Service
metadata:
  name: nexora-brain-metrics
  namespace: nexora
  labels:
    app: nexora-brain
    app.kubernetes.io/name: nexora-brain
    app.kubernetes.io/part-of: nexora-platform
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: 8001
      protocol: TCP
      name: metrics
  selector:
    app: nexora-brain
---
