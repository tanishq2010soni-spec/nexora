apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexora-qdrant
  namespace: nexora
  labels:
    app: nexora-qdrant
    app.kubernetes.io/name: nexora-qdrant
    app.kubernetes.io/part-of: nexora-platform
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nexora-qdrant
  template:
    metadata:
      labels:
        app: nexora-qdrant
        app.kubernetes.io/name: nexora-qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.9.0
          ports:
            - containerPort: 6333
              protocol: TCP
              name: http
            - containerPort: 6334
              protocol: TCP
              name: grpc
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: qdrant-data
              mountPath: /qdrant/storage
      volumes:
        - name: qdrant-data
          emptyDir: {}
