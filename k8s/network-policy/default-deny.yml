apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: nexora
  labels:
    app.kubernetes.io/name: nexora
    app.kubernetes.io/part-of: nexora-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-brain-ingress
  namespace: nexora
  labels:
    app.kubernetes.io/name: nexora-brain
    app.kubernetes.io/part-of: nexora-platform
spec:
  podSelector:
    matchLabels:
      app: nexora-brain
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8000
          protocol: TCP
    - from:
        - podSelector:
            matchLabels:
              app: nexora-brain
      ports:
        - port: 8000
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: nexora-postgres
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: nexora-redis
      ports:
        - port: 6379
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: nexora-qdrant
      ports:
        - port: 6333
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: nexora-ollama
      ports:
        - port: 11434
          protocol: TCP
---
