version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: nexora_nginx
    restart: always
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      brain:
        condition: service_healthy
    networks:
      - frontend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  brain:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: nexora_brain_api
    restart: always
    expose:
      - "8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL_FILE=/run/secrets/database_url
      - JWT_SECRET_KEY_FILE=/run/secrets/jwt_secret_key
      - LOG_LEVEL=info
      - CORS_ORIGINS=https://your-production-domain.com
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_URL=http://ollama:11434
    secrets:
      - jwt_secret_key
      - database_url
      - db_password
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  postgres:
    image: postgres:15-alpine
    container_name: nexora_postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
      - POSTGRES_DB=nexora
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexora"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: nexora_qdrant
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: nexora_redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  ollama:
    image: ollama/ollama:0.3.0
    container_name: nexora_ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

secrets:
  jwt_secret_key:
    external: true
  database_url:
    external: true
  db_password:
    external: true

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
  redis_data:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
