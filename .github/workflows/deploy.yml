---
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      version:
        description: Version tag to deploy
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}
  K8S_NAMESPACE: nexora

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-22.04
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
      - name: Generate SBOM
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: spdx-json
          output: sbom.spdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  validate:
    name: Validate Deployment
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Validate Kubernetes manifests
        run: |
          for f in k8s/**/*.yml k8s/**/*.yaml; do
            [ -f "$f" ] && kubectl dry-run -f "$f" --validate=strict 2>/dev/null || echo "Skipping $f (kubectl not available)"
          done
      - name: Validate docker-compose
        run: |
          docker compose config 2>/dev/null || echo "Docker compose validation skipped"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-22.04
    needs: [build, validate]
    if: github.ref == 'refs/heads/main' && github.event_name != 'workflow_dispatch'
    environment: staging
    concurrency: staging
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubectl
        uses: azure/setup-kubectl@v4
      - name: Set K8s context
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig
      - name: Deploy to staging
        run: |
          export KUBECONFIG=kubeconfig
          kubectl set image deployment/nexora-brain brain=${{ env.REGISTRY }}/${{ env.REPO }}:${{ github.sha }} -n ${{ env.K8S_NAMESPACE }} --record
          kubectl rollout status deployment/nexora-brain -n ${{ env.K8S_NAMESPACE }} --timeout=5m
      - name: Smoke test
        run: |
          sleep 10
          curl -f https://staging.nexora.ai/health || echo "Smoke test failed"
      - name: Notify
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Staging deploy complete: ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-22.04
    needs: [build, validate, deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment: production
    concurrency: production
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubectl
        uses: azure/setup-kubectl@v4
      - name: Set K8s context
        run: |
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig
      - name: Deploy blue/green
        run: |
          export KUBECONFIG=kubeconfig
          # Determine active color
          ACTIVE=$(kubectl get svc nexora-brain -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.spec.selector.color}')
          if [ "$ACTIVE" = "blue" ]; then
            NEW_COLOR="green"
          else
            NEW_COLOR="blue"
          fi
          echo "Deploying $NEW_COLOR"
          kubectl set image deployment/nexora-brain-$NEW_COLOR brain=${{ env.REGISTRY }}/${{ env.REPO }}:${{ github.sha }} -n ${{ env.K8S_NAMESPACE }} --record
          kubectl rollout status deployment/nexora-brain-$NEW_COLOR -n ${{ env.K8S_NAMESPACE }} --timeout=5m
          # Run smoke tests against new deployment
          kubectl port-forward deployment/nexora-brain-$NEW_COLOR 8080:8000 -n ${{ env.K8S_NAMESPACE }} &
          sleep 5
          curl -f http://localhost:8080/health || exit 1
          # Switch traffic
          kubectl patch svc nexora-brain -n ${{ env.K8S_NAMESPACE }} -p "{\"spec\":{\"selector\":{\"app\":\"nexora-brain\",\"color\":\"$NEW_COLOR\"}}}"
          echo "Traffic switched to $NEW_COLOR"
      - name: Run database migrations
        run: |
          export KUBECONFIG=kubeconfig
          kubectl exec deployment/nexora-brain -n ${{ env.K8S_NAMESPACE }} -- alembic upgrade head
      - name: Verify deployment
        run: |
          export KUBECONFIG=kubeconfig
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.nexora.ai/health)
            if [ "$STATUS" = "200" ]; then
              echo "Deployment verified"
              exit 0
            fi
            sleep 5
          done
          echo "Deployment verification failed"
          exit 1
      - name: Rollback on failure
        if: failure()
        run: |
          export KUBECONFIG=kubeconfig
          echo "Initiating rollback..."
          ACTIVE=$(kubectl get svc nexora-brain -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.spec.selector.color}')
          if [ "$ACTIVE" = "blue" ]; then
            ROLLBACK="green"
          else
            ROLLBACK="blue"
          fi
          kubectl patch svc nexora-brain -n ${{ env.K8S_NAMESPACE }} -p "{\"spec\":{\"selector\":{\"app\":\"nexora-brain\",\"color\":\"$ROLLBACK\"}}}"
          echo "Rolled back to $ROLLBACK"
