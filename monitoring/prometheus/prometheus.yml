global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    cluster: nexora
    environment: production

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "nexora-brain"
    scrape_interval: 10s
    metrics_path: /api/v1/metrics
    static_configs:
      - targets:
          - "brain:8000"
        labels:
          service: brain

  - job_name: "nexora-brain-internal"
    scrape_interval: 10s
    metrics_path: /metrics
    static_configs:
      - targets:
          - "brain:8001"
        labels:
          service: brain-internal

  - job_name: "node"
    static_configs:
      - targets:
          - "node-exporter:9100"

  - job_name: "cadvisor"
    static_configs:
      - targets:
          - "cadvisor:8080"

  - job_name: "postgres-exporter"
    static_configs:
      - targets:
          - "postgres-exporter:9187"

  - job_name: "redis-exporter"
    static_configs:
      - targets:
          - "redis-exporter:9121"

  - job_name: "promtail"
    static_configs:
      - targets:
          - "promtail:9080"
