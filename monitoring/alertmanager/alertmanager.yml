global:
  resolve_timeout: 5m
  slack_api_url: "" # Set via environment variable SLACK_WEBHOOK_URL
  pagerduty_url: "https://events.pagerduty.com/v2/enqueue"

route:
  group_by: ["alertname", "severity", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 15m
    - match:
        severity: warning
      receiver: "warning"
      repeat_interval: 1h

receivers:
  - name: "default"
    slack_configs:
      - channel: "#alerts"
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        send_resolved: true

  - name: "critical"
    slack_configs:
      - channel: "#critical"
        title: '[CRITICAL] {{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        send_resolved: true
    pagerduty_configs:
      - severity: critical
        routing_key: "" # Set via environment
        description: '{{ template "pd.description" . }}'

  - name: "warning"
    slack_configs:
      - channel: "#alerts"
        title: '[WARNING] {{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "service"]

templates:
  - "/etc/alertmanager/templates/*.tmpl"
